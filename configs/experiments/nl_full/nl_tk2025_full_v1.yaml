experiment_id: "nl_tk2025_full_v1"
experiment_name: "NL Tweede Kamer 2025 — Full Run (8 parties, all IE, 3 metrics)"
description: "Full-scale NL run: 8 TK2025 parties (PVV, VVD, CDA, SP, D66, GroenLinks-PvdA, JA21, BBB), all statements, all 6 IE conditions, all 3 metrics. Generator models: GPT-5.4 + Qwen3.6-flash + Claude Sonnet 4.6."

dataset:
  path: "datasets/vaa_benchmark.jsonl"
  source: "ResPolitica"
  election_ids:
    - "nl_tk2025"
  # party_name values must match metadata.party_name in the benchmark JSONL
  party_filter:
    - "PVV"
    - "VVD"
    - "CDA"
    - "SP"
    - "D66"
    - "GroenLinks-PvdA"
    - "JA21"
    - "BBB"
  statement_filter: null

conditions:
  ie_levels: "all"
  party_label: "real"
  response_language: "Dutch"
  year_mention: "none"

model_ids:
  - "gpt_5_4"
  - "qwen3_6_flash"
  - "claude_sonnet_4_6"

prompts:
  levels:
    - "default"
  system_prompt: "system.txt"
  templates:
    default: "default_user.txt"

# k=1, temperature=0.0 = greedy decoding (per thesis methodology)
runs:
  - k: 1
    temperature: 0.0

metrics:
  - "faithfulness"
  - "impartiality"
  - "epistemic_calibration"

judges:
  panel:
    - "gemini_3_flash_judge"
    - "deepseek_v4_flash_judge"
    - "xiaomi_mimo_judge"
  temperature: 0.0
  max_concurrent_per_model: 10
  timeout_seconds: null
  max_retries: 2
  retry_backoff_base: 2.0
  retry_backoff_max: 60.0

collection:
  max_retries: 3
  retry_backoff_base: 2.0
  retry_backoff_max: 60.0
  concurrency:
    default: 5
    per_model: {}
