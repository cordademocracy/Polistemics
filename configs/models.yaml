models:
  # --- Evaluated models ---
  # Reasoning: effort="low" for OpenAI/Grok-family models (percentage-based, reliable).
  # reasoning_max_tokens=400 for Qwen3/DeepSeek (hard cap — effort % not reliably honored).

  - id: "qwen3_6_flash"
    provider: "openrouter"
    model: "qwen/qwen3.6-flash"
    max_tokens: 2048
    reasoning_max_tokens: 400
    api_key_env: "OPENROUTER_API_KEY"

  - id: "gpt_5_4"
    provider: "openrouter"
    model: "openai/gpt-5.4"
    max_tokens: 2048
    reasoning_effort: "low"
    api_key_env: "OPENROUTER_API_KEY"

  - id: "claude_sonnet_4_6"
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4-6"
    max_tokens: 2048
    reasoning_effort: "low"
    api_key_env: "OPENROUTER_API_KEY_GEMINI"

# --- Judge Models ---
# Cross-family evaluation panel (3 models, majority vote)
judge_models:
  - id: "gemini_3_flash_judge"
    provider: "openrouter"
    model: "google/gemini-3-flash-preview"
    output_mode: "native"
    max_tokens: 2048
    reasoning_max_tokens: 400
    api_key_env: "OPENROUTER_API_KEY_GEMINI"

  - id: "deepseek_v4_flash_judge"
    provider: "openrouter"
    model: "deepseek/deepseek-v4-flash"
    output_mode: "native"
    max_tokens: 2048
    reasoning_max_tokens: 400
    api_key_env: "OPENROUTER_API_KEY"

  - id: "xiaomi_mimo_judge"
    provider: "openrouter"
    model: "xiaomi/mimo-v2.5"
    output_mode: "tool"
    max_tokens: 2048
    reasoning_max_tokens: 400
    api_key_env: "OPENROUTER_API_KEY"
